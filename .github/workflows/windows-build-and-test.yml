name: Windows build and test workflow
on:
  workflow_call:
    inputs:
      build_ref:
        type: string
        required: false
      build_configure_extra_args:
        type: string
        required: false

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build_type: [ RelWithDebInfo ]

    name: "clang-cl • openblas • ${{ matrix.build_type }}"
    runs-on: windows-2022
    defaults:
      run:
        shell: bash -el {0}
    steps:

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          path: src

      # ---- Conda environment setup ----
      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: einsums-env
          conda-remove-defaults: "true"

      - name: Install ruamel.yaml
        run: conda install -c conda-forge ruamel.yaml

      - name: Merge Conda YAML files
        working-directory: src/devtools/conda-envs
        run: python merge_yml.py windows openblas

      - name: Cache Conda env
        uses: actions/cache@v4
        with:
          path: ${{ env.CONDA }}/envs
          key: conda-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src/devtools/conda-envs/conda.yml') }}
        id: cache

      - name: Update environment
        run: conda env update -n einsums-env -f src/devtools/conda-envs/conda.yml
        if: steps.cache.outputs.cache-hit != 'true'

      - name: Conda Environment
        run: |
          conda info
          conda list

      # ---- MSVC + Conda environment ----
      # Manual vcvars64.bat call replaces ilammy/msvc-dev-cmd@v1 which is buggy
      # on windows-2022 (garbles GITHUB_WORKSPACE and other env vars as VS
      # extension script paths). Same approach as build_windows.bat.
      - name: Setup MSVC and merge conda environment
        shell: cmd
        run: |
          @echo on
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" > nul 2>&1
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%

          call conda activate einsums-env

          set "LIB=%CONDA_PREFIX%\Library\lib;%LIB%"
          set "INCLUDE=%CONDA_PREFIX%\Library\include;%INCLUDE%"
          set "PATH=%CONDA_PREFIX%\Library\bin;%CONDA_PREFIX%\Library\mingw64\bin;%PATH%"

          set "CC=%CONDA_PREFIX%\Library\bin\clang-cl.exe"
          set "CXX=%CONDA_PREFIX%\Library\bin\clang-cl.exe"

          set "CXXFLAGS="
          set "CFLAGS="
          set "CPPFLAGS="

          echo LIB=%LIB%>> %GITHUB_ENV%
          echo INCLUDE=%INCLUDE%>> %GITHUB_ENV%
          echo PATH=%PATH%>> %GITHUB_ENV%
          echo CC=%CC%>> %GITHUB_ENV%
          echo CXX=%CXX%>> %GITHUB_ENV%
          echo CXXFLAGS=>> %GITHUB_ENV%
          echo CFLAGS=>> %GITHUB_ENV%
          echo CPPFLAGS=>> %GITHUB_ENV%

          echo --- Environment set up ---

      # ---- Configure, Build, Test ----
      - name: Configure CMake
        shell: pwsh
        run: |
          conda activate einsums-env

          # Re-assert compiler (conda activation may override env vars)
          $env:CC  = "$env:CONDA_PREFIX\Library\bin\clang-cl.exe"
          $env:CXX = "$env:CONDA_PREFIX\Library\bin\clang-cl.exe"

          # Clear conda-set flags that conflict with CMake (/std:c++17 vs /std:c++20)
          $env:CXXFLAGS = ""
          $env:CFLAGS   = ""
          $env:CPPFLAGS = ""

          cmake `
            -G Ninja `
            -S "$env:GITHUB_WORKSPACE\src" `
            -B "$env:GITHUB_WORKSPACE\build" `
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -D CMAKE_C_COMPILER="$env:CC" `
            -D CMAKE_CXX_COMPILER="$env:CXX" `
            -D CMAKE_PREFIX_PATH="$env:CONDA_PREFIX\Library" `
            -D EINSUMS_BUILD_PYTHON=OFF `
            -D EINSUMS_WITH_TESTS=ON `
            -D EINSUMS_WITH_EXAMPLES=ON `
            -D EINSUMS_WITH_BACKTRACES=OFF `
            -D EINSUMS_SHOW_WARNING=OFF `
            -D CMAKE_INSTALL_PREFIX="$env:GITHUB_WORKSPACE\installed" `
            ${{ inputs.build_configure_extra_args }}

      - name: Build
        shell: pwsh
        run: |
          conda activate einsums-env
          cmake --build "$env:GITHUB_WORKSPACE\build" --config ${{ matrix.build_type }}

      - name: Test (CTest)
        shell: pwsh
        working-directory: ${{ github.workspace }}/build
        run: |
          # DLL search path: Einsums, spdlog, and conda libraries must be on PATH.
          $env:PATH = "$env:GITHUB_WORKSPACE\build\${{ matrix.build_type }}\bin;$env:GITHUB_WORKSPACE\build\_deps\spdlog-build;$env:CONDA_PREFIX\Library\bin;$env:CONDA_PREFIX\Library\mingw64\bin;$env:PATH"
          ctest -j4 --output-on-failure
